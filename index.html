<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Potongan Tunjangan Guru KPPN Pangkalpinang</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --blue-header: #1d3557;
            --blue-banner: #23395d;
            --blue-table-head: #4e89ae;
            --bg-body: #f4f7f9;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-body); margin: 0; padding: 20px; }
        
        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; visibility: hidden;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #ccc; border-top: 5px solid var(--blue-header);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; font-weight: bold; color: var(--blue-header); }

        /* Header Logo & Title */
        .top-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-apotu { height: 60px; border-radius: 5px; }
        .title-text { line-height: 1.2; }
        .title-text .main { font-size: 18px; font-weight: bold; color: #1d3557; display: block; }
        .title-text .sub { font-size: 16px; font-weight: bold; color: #1d3557; }

        /* Banner Biru Tengah */
        .main-banner { 
            background: var(--blue-banner); 
            color: white; text-align: center; padding: 15px; border-radius: 8px; 
            font-size: 18px; font-weight: bold; margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Filter Area */
        .filters { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 25px; flex-wrap: wrap; }
        .mode-btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        #btnTriwulan { background: #1d3557; color: white; }
        #btnAkumulasi { background: #ef4444; color: white; }
        .mode-btn:hover { opacity: 0.8; }
        
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; min-width: 120px; font-size: 14px; }

        /* Tabel */
        .table-container { background: white; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--blue-table-head); color: white; padding: 12px; font-size: 16px; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 15px; color: #333; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .txt-right { text-align: right; }

        /* Chart Area */
        .charts-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .chartBox { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 380px;
            display: flex; flex-direction: column; align-items: center;
        }
        .chartBox h4 { margin-top: 0; margin-bottom: 20px; color: #333; font-size: 16px; }
        .canvas-wrapper { width: 100%; flex-grow: 1; position: relative; }

        /* Tombol Login */
        .btn-login-container { display: flex; justify-content: center; margin-top: 20px; }
        .btn-login { 
            width: 100%; max-width: 1500px; padding: 15px; 
            background: var(--blue-header); color: white; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: bold; 
            font-size: 15px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-login:hover { background: #23395d; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        @media(max-width:1100px){ .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- Loading Indicator -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Memuat Data...</div>
</div>

<div class="top-header">
    <img src="apotu.png" class="logo-apotu" alt="Logo Apotu">
    <div class="title-text">
        <span class="main">Aplikasi</span>
        <span class="sub">Potongan Tunjangan Guru KPPN Painan</span>
    </div>
</div>

<div class="main-banner">
    Penyaluran TPG, TKG dan Tamsil lingkup KPPN Pangkalpinang
</div>

<div class="filters">
    <button class="mode-btn" id="btnTriwulan">Per Triwulan</button>
    <button class="mode-btn" id="btnAkumulasi">Akumulasi</button>
    
    <select id="filterJenis">
        <option value="Semua">Semua Jns</option>
        <option value="TPG">TPG</option>
        <option value="TKG">TKG</option>
        <option value="Tamsil">Tamsil</option>
    </select>

    <select id="filterTw">
        <option value="1">Triwulan I</option>
        <option value="2">Triwulan II</option>
        <option value="3">Triwulan III</option>
        <option value="4">Triwulan IV</option>
    </select>

    <select id="filterTh">
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th width="15%">Jenis</th>
                <th width="20%">Pagu</th>
                <th width="20%">Realisasi</th>
                <th width="10%">Penerima</th>
                <th width="15%">PPh</th>
                <th width="15%">JKN</th>
                <th width="5%">Persentase</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div class="charts-container">
    <div class="chartBox">
        <h4>Pagu vs Realisasi</h4>
        <div class="canvas-wrapper"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chartBox">
        <h4>Penerima</h4>
        <div class="canvas-wrapper"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="chartBox">
        <h4>Realisasi vs PPh vs JKN</h4>
        <div class="canvas-wrapper"><canvas id="pphChart"></canvas></div>
    </div>
</div>

<div class="btn-login-container">
    <button class="btn-login" onclick="location.href='login.html'">LOGIN PENGELOLAAN DATA</button>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw76XEewiWIhB6COJB_5p7M2TkFZK0L0NHxns9N9K16Qi22tewp59g_aPGiTMfurVtS/exec";
    let dataAll = [], dataPagu = [], mode = "akumulasi";
    let barChart, pieChart, pphChart;

    const loader = document.getElementById("loading-overlay");

    window.onload = async () => {
        // --- PERBAIKAN: SET DEFAULT WAKTU OTOMATIS ---
        const sekarang = new Date();
        const bulan = sekarang.getMonth() + 1;
        const tahun = sekarang.getFullYear();
        const tw = Math.ceil(bulan / 3);

        const selectTw = document.getElementById("filterTw");
        const selectTh = document.getElementById("filterTh");

        // Set value triwulan
        selectTw.value = tw;
        
        // Set value tahun (jika tahun sekarang ada di opsi)
        if ([...selectTh.options].some(opt => opt.value == tahun)) {
            selectTh.value = tahun;
        }
        // --------------------------------------------

        await loadData();
        applyFilter();
    };

    async function loadData() {
        loader.style.visibility = "visible"; 
        const th = document.getElementById("filterTh").value;
        try {
            const [r1, r2] = await Promise.all([
                fetch(`${API}?mode=list&tahun=${th}`),
                fetch(`${API}?mode=pagu`)
            ]);
            dataAll = (await r1.json()).data || [];
            dataPagu = (await r2.json()).data || [];
        } catch (e) { 
            console.error("Gagal sinkronisasi data", e); 
        } finally {
            loader.style.visibility = "hidden"; 
        }
    }

    document.querySelectorAll("select").forEach(s => {
        s.onchange = async () => { if(s.id === "filterTh") await loadData(); applyFilter(); };
    });

    document.getElementById("btnTriwulan").onclick = () => { mode="triwulan"; applyFilter(); };
    document.getElementById("btnAkumulasi").onclick = () => { mode="akumulasi"; applyFilter(); };

    function applyFilter() {
        let tw = Number(document.getElementById("filterTw").value);
        let jns = document.getElementById("filterJenis").value;
        let filtered = (mode === "triwulan") ? dataAll.filter(r => Number(r.triwulan) === tw) : dataAll.filter(r => Number(r.triwulan) <= tw);
        if (jns !== "Semua") filtered = filtered.filter(r => r.Jenis === jns);
        render(filtered);
    }

    function render(data) {
        const th = document.getElementById("filterTh").value;
        const p = dataPagu.find(r => String(r.Tahun) === th) || {};
        const paguMap = { TPG: Number(p["Pagu TPG"]||0), TKG: Number(p["Pagu TKG"]||0), Tamsil: Number(p["Pagu Tamsil"]||0) };
        
        let real = {TPG:0, TKG:0, Tamsil:0}, pener = {TPG:0, TKG:0, Tamsil:0}, pph = {TPG:0, TKG:0, Tamsil:0}, jkn = {TPG:0, TKG:0, Tamsil:0};

        data.forEach(d => {
            if(real.hasOwnProperty(d.Jenis)) {
                real[d.Jenis] += Number(d.Bruto||0);
                pener[d.Jenis] += Number(d.Jml||0);
                pph[d.Jenis] += Number(d.PPh||0);
                jkn[d.Jenis] += Number(d.Jkn||0);
            }
        });

        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        ["TPG", "TKG", "Tamsil"].forEach(j => {
            let prs = paguMap[j] > 0 ? ((real[j]/paguMap[j])*100).toFixed(1) : 0;
            tbody.innerHTML += `<tr>
                <td style="font-weight:bold">${j}</td>
                <td class="txt-right">${paguMap[j].toLocaleString('id-ID')}</td>
                <td class="txt-right">${real[j].toLocaleString('id-ID')}</td>
                <td>${pener[j].toLocaleString('id-ID')}</td>
                <td class="txt-right">${pph[j].toLocaleString('id-ID')}</td>
                <td class="txt-right">${jkn[j].toLocaleString('id-ID')}</td>
                <td>${prs}%</td>
            </tr>`;
        });

        updateCharts(real, pener, pph, jkn, paguMap);
    }

    function updateCharts(real, pener, pph, jkn, pagu) {
        const labels = ["TPG", "TKG", "Tamsil"];
        const leg = { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } };

        if (barChart) barChart.destroy();
        barChart = new Chart(document.getElementById("barChart"), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: "Pagu", data: labels.map(l => pagu[l]), backgroundColor: "#90e0ef" },
                    { label: "Realisasi", data: labels.map(l => real[l]), backgroundColor: "#1d2d44" }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: leg } }
        });

        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById("pieChart"), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{ data: labels.map(l => pener[l]), backgroundColor: ["#1d2d44", "#4e89ae", "#90e0ef"] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: leg } }
        });

        if (pphChart) pphChart.destroy();
        pphChart = new Chart(document.getElementById("pphChart"), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: "Realisasi", data: labels.map(l => real[l]), backgroundColor: "#1d2d44" },
                    { label: "PPh", data: labels.map(l => pph[l]), backgroundColor: "#f28482" },
                    { label: "JKN", data: labels.map(l => jkn[l]), backgroundColor: "#2a9d8f" }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: leg } }
        });
    }
</script>
</body>
</html>
