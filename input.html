<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data SP2D</title>
    <link rel="stylesheet" href="style.css">

    <script>
        // =============================
        // PROTEKSI HALAMAN
        // =============================
        if (sessionStorage.getItem("logged") !== "yes") {
            location.href = "login.html";
        }
        if (sessionStorage.getItem("role") !== "Admin") {
            location.href = "rincian.html";
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .page-title { text-align:center; font-size:26px; font-weight:bold; margin-top:10px; margin-bottom:15px; color: #1d3557; }
        .card { background:white; border-radius:16px; padding:25px; max-width:600px; margin:auto; box-shadow:0 4px 14px rgba(0,0,0,0.1); }
        
        .btn-group { display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
        .btn { padding:12px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600; transition: 0.3s; }
        .btn-primary { background:#1d3557; color:white; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-primary:hover { background:#457b9d; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { background:#6c757d; color:white; text-decoration: none; font-size: 14px; display: inline-block; }
        
        label { display: block; font-weight:600; color: #1d3557; margin-top: 15px; margin-bottom: 5px; }
        input, select { 
            width:100%; 
            padding:12px; 
            border-radius:8px; 
            border:1px solid #d0d4d9; 
            font-size:15px; 
            box-sizing: border-box; 
        }
        input:focus { border-color: #457b9d; outline: none; }

        .success, .error { padding:12px; border-radius:8px; font-weight:600; text-align:center; margin-top:15px; }
        .success { background:#d4edda; color:#155724; border: 1px solid #c3e6cb; }
        .error   { background:#f8d7da; color:#721c24; border: 1px solid #f5c6cb; }

        @media(max-width:600px){ .card { padding:20px; } .btn-group { flex-direction: column; } }
    </style>
</head>
<body>

<div class="btn-group">
    <button class="btn btn-back" onclick="location.href='rincian2.html'">⬅ Kembali ke Rincian</button>
    <button class="btn btn-back" onclick="logout()">Logout</button>
</div>

<div class="page-title">Input Data SP2D</div>

<div class="card">
    <label>Jenis Tunjangan</label>
    <select id="jenis">
        <option value="TPG">TPG</option>
        <option value="TKG">TKG</option>
        <option value="Tamsil">Tamsil</option>
    </select>

    <label>Triwulan</label>
    <select id="triwulan">
        <option value="1">Triwulan 1</option>
        <option value="2">Triwulan 2</option>
        <option value="3">Triwulan 3</option>
        <option value="4">Triwulan 4</option>
    </select>

    <label>Nomor SP2D</label>
    <input type="text" id="nomorSp2d" placeholder="Masukkan nomor SP2D">

    <label>Tanggal SP2D (Tahun akan dideteksi otomatis)</label>
    <input type="date" id="tanggalSp2d">

    <label>Bruto (Nilai Kotor)</label>
    <input type="number" id="bruto" placeholder="Angka saja">

    <label>PPh (Potongan Pajak)</label>
    <input type="number" id="pph" placeholder="Angka saja">

    <label>JKN (Iuran Kesehatan)</label>
    <input type="number" id="jkn" placeholder="Angka saja">

    <label>Jumlah Penerima (Orang)</label>
    <input type="number" id="jml" placeholder="Contoh: 40">

    <label>Link Google Drive (Laporan)</label>
    <input type="text" id="link" placeholder="https://drive.google.com/...">

    <button id="btnSimpan" class="btn btn-primary" onclick="kirimData()">Simpan ke Spreadsheet</button>

    <div id="notif"></div>
</div>

<script>
async function kirimData() {
    // 1. PASTIKAN URL INI ADALAH URL TERBARU DARI "NEW DEPLOYMENT" APPS SCRIPT ANDA
    const url = "https://script.google.com/macros/s/AKfycbw76XEewiWIhB6COJB_5p7M2TkFZK0L0NHxns9N9K16Qi22tewp59g_aPGiTMfurVtS/exec";
    
    const btn = document.getElementById("btnSimpan");
    const notif = document.getElementById("notif");

    // Ambil tanggal untuk deteksi tahun
    const tglInput = document.getElementById("tanggalSp2d").value;
    if (!tglInput) {
        notif.innerHTML = "<div class='error'>Pilih Tanggal terlebih dahulu!</div>";
        return;
    }

    const tahunTarget = tglInput.split("-")[0]; // Mengambil YYYY

    // Buat data payload
    const payload = {
        action: "insert", // PENTING: Agar dibaca oleh router doPost Apps Script
        tahun: tahunTarget,
        jenis: document.getElementById("jenis").value,
        triwulan: document.getElementById("triwulan").value,
        nomorSp2d: document.getElementById("nomorSp2d").value.trim(),
        tanggalSp2d: tglInput,
        bruto: document.getElementById("bruto").value || 0,
        pph: document.getElementById("pph").value || 0,
        jkn: document.getElementById("jkn").value || 0,
        jml: document.getElementById("jml").value || 0,
        link: document.getElementById("link").value.trim()
    };

    // Validasi input minimal
    if (!payload.nomorSp2d || !payload.bruto) {
        notif.innerHTML = "<div class='error'>Nomor SP2D dan Nilai Bruto wajib diisi!</div>";
        return;
    }

    btn.disabled = true;
    btn.innerText = "⌛ Sedang Menyimpan...";
    notif.innerHTML = "";

    try {
        // Menggunakan URLSearchParams agar data terbaca di e.parameter
        await fetch(url, {
            method: "POST",
            mode: "no-cors", // Standar untuk Apps Script
            cache: "no-cache",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(payload)
        });

        // Tampilkan pesan sukses
        notif.innerHTML = `<div class='success'>Berhasil Terkirim ke Tahun ${tahunTarget}!</div>`;
        
        setTimeout(() => {
            location.href = "rincian2.html";
        }, 2000);

    } catch (err) {
        notif.innerHTML = `<div class='error'>Kesalahan: ${err.message}</div>`;
        btn.disabled = false;
        btn.innerText = "Simpan ke Spreadsheet";
    }
}

function logout() {
    sessionStorage.clear();
    location.href = "login.html";
}
</script>

</body>
</html>
