<!DOCTYPE html>
<html>
<body onload="muatData()">
    <h2 id="judul">Memuat data...</h2>
    <button onclick="logout()">Logout</button>
    <div id="tabelContainer"></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw6AAD-UxV4NXQ4OfZvJan752njOb_vyJQQwp6-xQYlgV2AcVmfmOGt_sV-XI3gQ_7Y/exec"; // GANTI DENGAN URL DEPLOY TERBARU

        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }

        async function muatData() {
            const wewenang = sessionStorage.getItem("wewenang");
            if(!wewenang) { window.location.href = "login.html"; return; }

            document.getElementById("judul").innerText = `Data untuk: ${wewenang}`;

            const resp = await fetch(`${API}?mode=list&tahun=2025&wewenang=${wewenang}`);
            const hasil = await resp.json();

            if(hasil.status === "ok") {
                let html = "<table border='1'><tr><th>Jenis</th><th>Kabupaten</th><th>SP2D</th></tr>";
                hasil.data.forEach(row => {
                    html += `<tr><td>${row.Jenis}</td><td>${row.kabupaten}</td><td>${row["Nomor SP2D"]}</td></tr>`;
                });
                html += "</table>";
                document.getElementById("tabelContainer").innerHTML = html;
            }
        }
    </script>
</body>
</html>
