<!DOCTYPE html>
<html>
<body>
    <h2>Login Replikasi</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="prosesLogin()">Login</button>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw6AAD-UxV4NXQ4OfZvJan752njOb_vyJQQwp6-xQYlgV2AcVmfmOGt_sV-XI3gQ_7Y/exec"; // GANTI DENGAN URL DEPLOY TERBARU

        async function prosesLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            
            const resp = await fetch(`${API}?mode=login&user=${u}&pass=${p}`);
            const hasil = await resp.json();

            if(hasil.status === "ok") {
                sessionStorage.setItem("logged", "yes");
                sessionStorage.setItem("wewenang", hasil.wewenang);
                window.location.href = "rincian.html";
            } else {
                alert("Login Gagal!");
            }
        }
    </script>
</body>
</html>
